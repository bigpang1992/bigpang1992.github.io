backend:
  name: github
  repo: bigpang1992/bigpang1992
  branch: main

media_folder: static/medias
public_folder: /medias

collections:
  - name: "posts"
    label: "文章"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - { label: "草稿", name: "draft", widget: "boolean", default: false }
      - { label: "分类", name: "categories", widget: "list", default: [] }
      - { label: "标签", name: "tags", widget: "list", default: [] }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "描述", name: "description", widget: "text", required: false }
      - { label: "正文", name: "body", widget: "markdown" }
